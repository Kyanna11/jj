    <!-- Android：移除 viewport-fit=cover，避免系统状态栏区域发黑；iOS 保留 meta 中的 cover -->
    <script>
      (function () {
        var ua = navigator.userAgent || '';
        if (!/Android/i.test(ua)) return;
        var vp = document.querySelector('meta[name="viewport"]');
        if (!vp) return;
        var c = (vp.getAttribute('content') || '')
          .replace(/\s*,\s*viewport-fit=cover\b/i, '')
          .replace(/\s*,\s*viewport-fit=cover\s*,?\s*/i, '')
          .replace(/,\s*,/g, ',')
          .replace(/^\s*,|,\s*$/g, '')
          .trim();
        vp.setAttribute('content', c);
      })();
    </script>
